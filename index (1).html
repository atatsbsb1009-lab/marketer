<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>농산물 온라인 마케터 육성지원사업 — 내 지원 현황 조회</title>
<style>
  :root {
    --green-dark: #1A4731;
    --green-mid:  #2E7D52;
    --green-light:#97BC62;
    --blue:       #2E75B6;
    --orange:     #C55A11;
    --gray-bg:    #F4F7F5;
    --gray-line:  #E0EDE6;
    --text:       #1F2937;
    --muted:      #6B7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    background: var(--gray-bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── 헤더 */
  header {
    background: var(--green-dark);
    padding: 28px 48px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header .logo-area .badge {
    display: inline-block;
    background: var(--green-light);
    color: var(--green-dark);
    font-size: 11px; font-weight: 700;
    padding: 3px 12px; border-radius: 20px;
    margin-bottom: 8px;
  }
  header h1 { color: #fff; font-size: 22px; font-weight: 700; line-height: 1.4; }
  header p  { color: #C8E6C0; font-size: 13px; margin-top: 5px; }
  header .header-right { text-align: right; }
  header .header-right .data-status { font-size: 12px; }
  header .header-right .data-status.ok  { color: var(--green-light); }
  header .header-right .data-status.err { color: #FCA5A5; }
  header .header-right .data-status.loading { color: #C8E6C0; }

  /* ── 레이아웃 */
  .page-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 48px 80px;
  }

  /* ── 검색 카드 */
  .search-card {
    background: #fff;
    border: 1.5px solid var(--gray-line);
    border-radius: 14px;
    padding: 32px 36px;
    box-shadow: 0 2px 12px rgba(26,71,49,.07);
    margin-bottom: 28px;
  }
  .search-card h2 { font-size: 16px; color: var(--green-dark); margin-bottom: 18px; font-weight: 700; }
  .input-row { display: flex; gap: 12px; }
  .biz-input {
    flex: 1; max-width: 480px;
    padding: 14px 18px;
    border: 1.5px solid var(--gray-line);
    border-radius: 10px;
    font-size: 18px; font-family: inherit;
    color: var(--text); outline: none;
    transition: border-color .15s;
    letter-spacing: 1.5px;
  }
  .biz-input:focus { border-color: var(--green-mid); }
  .biz-input::placeholder { color: #CBD5E1; letter-spacing: 0; font-size: 14px; }
  .search-btn {
    padding: 14px 32px;
    background: var(--green-dark); color: #fff;
    border: none; border-radius: 10px;
    font-size: 15px; font-weight: 700;
    font-family: inherit; cursor: pointer;
    transition: background .15s; white-space: nowrap;
  }
  .search-btn:hover { background: var(--green-mid); }
  .hint { font-size: 12px; color: var(--muted); margin-top: 10px; }

  /* ── 로딩 */
  .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; display: none; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--gray-line);
    border-top-color: var(--green-dark);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 오류 */
  .error-msg {
    background: #FEF2F2; border: 1px solid #FECACA;
    border-radius: 10px; padding: 14px 18px;
    font-size: 14px; color: #991B1B;
    display: none; margin-bottom: 20px;
  }

  /* ── 결과 */
  #result { display: none; }

  /* 결과 헤더 */
  .result-header {
    border-radius: 14px 14px 0 0;
    padding: 24px 32px;
    display: flex; align-items: center; gap: 20px;
  }
  .result-header.시작 { background: var(--blue); }
  .result-header.성장 { background: var(--orange); }
  .result-header.도약 { background: var(--green-dark); }
  .result-header .step-emoji { font-size: 40px; line-height: 1; }
  .result-header .info h3 { color: #fff; font-size: 22px; font-weight: 700; }
  .result-header .info p  { color: rgba(255,255,255,.8); font-size: 13px; margin-top: 4px; }
  .result-header .level-badge {
    margin-left: auto;
    background: rgba(255,255,255,.2); color: #fff;
    font-size: 14px; padding: 6px 16px;
    border-radius: 20px; font-weight: 700; white-space: nowrap;
  }

  /* 결과 바디 */
  .result-body {
    background: #fff;
    border: 1.5px solid var(--gray-line);
    border-top: none;
    border-radius: 0 0 14px 14px;
    overflow: hidden;
  }

  /* 요약 수치 */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border-bottom: 1px solid var(--gray-line);
  }
  .summary-item {
    padding: 20px 24px;
    text-align: center;
    border-right: 1px solid var(--gray-line);
  }
  .summary-item:last-child { border-right: none; }
  .summary-num { font-size: 28px; font-weight: 700; }
  .summary-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* 과업 섹션 */
  .task-section {
    padding: 24px 32px;
    border-bottom: 1px solid var(--gray-line);
  }
  .task-section:last-child { border-bottom: none; }
  .section-head {
    font-size: 13px; font-weight: 700;
    color: var(--muted); letter-spacing: .4px;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-head .bar { width: 3px; height: 14px; border-radius: 2px; flex-shrink: 0; }

  /* 해시태그 행 */
  .hash-row {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 12px 14px; border-radius: 10px;
    cursor: pointer; transition: background .15s;
    margin-bottom: 6px;
    border: 1.5px solid transparent;
    user-select: none;
  }
  .hash-row:last-child { margin-bottom: 0; }
  .hash-row:hover { background: var(--gray-bg); }

  .hash-row .chk {
    width: 22px; height: 22px; min-width: 22px;
    border-radius: 6px; border: 2px solid #D1D5DB;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: transparent;
    transition: all .15s; margin-top: 1px; background: #fff;
  }
  .hash-row.checked .chk { border-color: currentColor; background: currentColor; color: #fff; }

  .hash-content { flex: 1; }
  .hash-tag {
    display: inline-block; font-size: 13px; font-weight: 700;
    padding: 3px 11px; border-radius: 20px; margin-bottom: 4px;
  }
  .hash-title { font-size: 14px; font-weight: 600; margin-left: 6px; vertical-align: middle; }
  .hash-desc {
    font-size: 13px; color: var(--muted);
    line-height: 1.6; display: none; margin-top: 4px;
  }
  .hash-row.checked .hash-desc { display: block; }

  .status-badge {
    display: inline-block; font-size: 12px; font-weight: 700;
    padding: 3px 10px; border-radius: 20px;
    margin-left: 8px; vertical-align: middle;
  }
  .s-done { background: #D1FAE5; color: #065F46; }
  .s-ing  { background: #FEF3C7; color: #92400E; }
  .s-none { background: #F3F4F6; color: #9CA3AF; }

  /* 단계별 색상 */
  .color-시작 { color: var(--blue); }   .bg-시작 { background: #DBEAFE; color: #1E40AF; }
  .color-성장 { color: var(--orange); } .bg-성장 { background: #FEE2C8; color: #92400E; }
  .color-도약 { color: var(--green-dark); } .bg-도약 { background: #D1FAE5; color: #065F46; }

  /* 진행률 */
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .progress-bar   { height: 10px; background: #E5E7EB; border-radius: 10px; overflow: hidden; }
  .progress-fill  { height: 100%; border-radius: 10px; transition: width .7s; }
  .fill-시작 { background: var(--blue); }
  .fill-성장 { background: var(--orange); }
  .fill-도약 { background: var(--green-dark); }

  /* 추가지원 */
  .extra-note {
    background: #FEF9EC; border: 1px dashed #FCD34D;
    border-radius: 10px; padding: 14px 18px;
    font-size: 13px; color: #92400E; line-height: 1.7;
  }
  .extra-none {
    background: #F9FAFB; border: 1px dashed #E5E7EB;
    border-radius: 10px; padding: 14px 18px;
    font-size: 13px; color: var(--muted); line-height: 1.7;
  }

  /* 하단 안내 */
  .footer-note {
    margin-top: 24px;
    background: #EFF6FF; border: 1px solid #BFDBFE;
    border-radius: 10px; padding: 16px 20px;
    font-size: 13px; color: #1E40AF; line-height: 1.7;
  }
  .footer-note strong { display: block; margin-bottom: 4px; font-size: 14px; }

  footer {
    text-align: center; padding: 24px;
    font-size: 12px; color: var(--muted);
    border-top: 1px solid var(--gray-line);
    margin-top: 40px;
  }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="badge">2026 aT 한국농수산식품유통공사</div>
    <h1>농산물 온라인 마케터 육성지원사업<br>내 지원 현황 조회</h1>
    <p>사업자번호를 입력하면 내 단계와 과업 진행 현황을 확인할 수 있습니다</p>
  </div>
  <div class="header-right">
    <div class="data-status loading" id="dataStatus">⏳ 데이터 불러오는 중...</div>
  </div>
</header>

<div class="page-wrap">

  <div class="search-card">
    <h2>🔍 사업자번호로 조회하기</h2>
    <div class="input-row">
      <input class="biz-input" id="bizInput" type="text"
             placeholder="000-00-00000  (하이픈 없이도 가능)" maxlength="12"
             oninput="formatBiz(this)"
             onkeydown="if(event.key==='Enter')doSearch()">
      <button class="search-btn" onclick="doSearch()">조회하기</button>
    </div>
    <p class="hint">※ 구글 시트 데이터와 실시간 연동됩니다 — 시트 수정 시 자동 반영</p>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    조회 중입니다...
  </div>

  <div class="error-msg" id="errMsg"></div>
  <div id="result"></div>

  <div class="footer-note">
    <strong>💡 조회가 안 된다면?</strong>
    사업자번호가 정확한지 확인해 주세요.<br>
    문의 : 운영사무국 02-724-1112
  </div>

</div>

<footer>2026 농산물 온라인 마케터 육성지원사업 운영단 | aT 한국농수산식품유통공사</footer>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbz3R5qfwG8_h84gH3FQSs9xsGA6XjO3i3ytVxvrn_mt-HmUyqsCQa_s18VPVEJH_aqW/exec';

let DB = null;

function loadData() {
  const statusEl = document.getElementById('dataStatus');
  window.__jsonpCallback = function(json) {
    DB = json.data;
    statusEl.textContent  = '✅ ' + DB.length + '개 업체 데이터 로드 완료';
    statusEl.className    = 'data-status ok';
    const old = document.getElementById('jsonpScript');
    if (old) old.remove();
  };
  const script = document.createElement('script');
  script.id  = 'jsonpScript';
  script.src = API_URL + '?callback=__jsonpCallback';
  script.onerror = function() {
    statusEl.textContent = '❌ 데이터 로드 실패 — 새로고침해 주세요';
    statusEl.className   = 'data-status err';
  };
  document.body.appendChild(script);
}

loadData();

function formatBiz(el) {
  let v = el.value.replace(/[^0-9]/g, '');
  if (v.length > 5)      v = v.slice(0,3)+'-'+v.slice(3,5)+'-'+v.slice(5,10);
  else if (v.length > 3) v = v.slice(0,3)+'-'+v.slice(3);
  el.value = v;
}

function normBiz(v) { return (v||'').replace(/[^0-9]/g, ''); }

function doSearch() {
  const errEl    = document.getElementById('errMsg');
  const resultEl = document.getElementById('result');
  const loadEl   = document.getElementById('loading');
  const input    = document.getElementById('bizInput').value.trim();

  errEl.style.display    = 'none';
  resultEl.style.display = 'none';

  if (!input) {
    errEl.textContent   = '⚠️ 사업자번호를 입력해 주세요.';
    errEl.style.display = 'block';
    return;
  }

  if (!DB) {
    loadEl.style.display = 'block';
    let tried = 0;
    const wait = setInterval(function() {
      tried++;
      if (DB) {
        clearInterval(wait);
        loadEl.style.display = 'none';
        findAndRender(input);
      } else if (tried > 30) {
        clearInterval(wait);
        loadEl.style.display = 'none';
        errEl.textContent   = '❌ 데이터를 불러올 수 없습니다. 페이지를 새로고침 후 다시 시도해 주세요.';
        errEl.style.display = 'block';
      }
    }, 300);
    return;
  }

  findAndRender(input);
}

function findAndRender(input) {
  const errEl = document.getElementById('errMsg');
  const query = normBiz(input);
  const found = DB.find(r => normBiz(r.biz) === query || normBiz(r.biz_fmt||'') === query);

  if (!found) {
    errEl.textContent   = '❌ 등록된 참여업체를 찾을 수 없습니다. 사업자번호를 다시 확인해 주세요.';
    errEl.style.display = 'block';
    return;
  }

  renderResult(found);
}

const levelEmoji = { '시작':'🌱', '성장':'🌿', '도약':'🌳' };
const colorMap   = { '시작':'#2E75B6', '성장':'#C55A11', '도약':'#1A4731' };
const bgMap      = { '시작':'#EFF6FF',  '성장':'#FFF7ED',  '도약':'#F0FBF4' };

const taskDef = {
  '시작': [
    { tag:'#교육',               title:'온라인 판매 마케팅 교육',         key:'edu',      desc:'온라인 시장 이해, 플랫폼 입점·운영 기초 중심 교육 · 알기 쉬운 마케팅 첫걸음(with AI) 포함' },
    { tag:'#컨설팅',             title:'1:1 맞춤 컨설팅 (2~3회)',        key:'consult',  desc:'현황 진단 → 입점 최적화 → 초기 마케팅 실행까지 단계별 1:1 인큐베이팅 지원' },
    { tag:'#상세페이지_제작지원',  title:'상세페이지 제작 지원',            key:'content',  desc:'aT 스튜디오 연계 콘텐츠 제작 (선착순 마감, 시작 단계 우선)' },
    { tag:'#기획전',             title:'온라인 기획전 참여',              key:'exhibit',  desc:'오픈마켓·버티컬커머스 기획전 입점 · 20% 할인쿠폰 지원' },
    { tag:'#구매상담회',          title:'구매상담회',                     key:'consult2', desc:'온라인 MD와의 1:1 입점 상담 · 판로 개척 기회 제공' },
  ],
  '성장': [
    { tag:'#교육',                    title:'온라인 판매 마케팅 교육',            key:'edu',      desc:'실습·응용 중심 교육 · SNS·검색광고, 브랜드 마케팅(with AI) 등' },
    { tag:'#컨설팅',                  title:'컨설팅 (1~2회)',                    key:'consult',  desc:'기획전 前 전략 수립 + 기획전 後 데이터 분석 및 개선 방향 도출' },
    { tag:'#상세페이지_또는_영상',     title:'상세페이지 또는 영상 제작 지원 (택1)', key:'content',  desc:'aT 스튜디오 연계 · 상세페이지 또는 숏폼 영상 중 선택 (선착순)' },
    { tag:'#기획전',                  title:'온라인 기획전 참여',                 key:'exhibit',  desc:'오픈마켓·버티컬커머스 기획전 입점 · 20% 할인쿠폰 지원' },
    { tag:'#구매상담회',               title:'구매상담회',                        key:'consult2', desc:'온라인 MD와의 1:1 판로 확대 상담 · 신규 채널 진출 연결' },
  ],
  '도약': [
    { tag:'#교육',       title:'온라인 판매 마케팅 교육', key:'edu',      desc:'AI·데이터 활용 심화 교육 · 마켓 6.0 트렌드, 데이터 관리 AI 활용 등' },
    { tag:'#기획전',     title:'온라인 기획전 참여',     key:'exhibit',  desc:'오픈마켓·버티컬커머스 기획전 입점 · 20% 할인쿠폰 · 브랜드관 노출 기회' },
    { tag:'#구매상담회',  title:'구매상담회',            key:'consult2', desc:'신규 판로 개척 · B2B 유통 연계 상담 · 벤더사 매칭 기회' },
  ],
};

function statusBadge(key, val) {
  if (key === 'edu') {
    if (val === '수료완료') return ['s-done', '✅ 수료완료'];
    if (val === '참여중')   return ['s-ing',  '🔄 참여중'];
    return ['s-none', '미참여'];
  }
  if (key === 'consult')  return (val && val !== '미참여') ? ['s-done', '✅ ' + val]           : ['s-none', '미참여'];
  if (key === 'content')  return (val && val !== '미신청')  ? ['s-done', '✅ ' + val + ' 신청'] : ['s-none', '미신청'];
  if (key === 'exhibit')  return val === '참여' ? ['s-done', '✅ 참여완료'] : ['s-none', '미참여'];
  if (key === 'consult2') return val === '참여' ? ['s-done', '✅ 참여완료'] : ['s-none', '미참여'];
  return ['s-none', val || '미참여'];
}

function isDone(key, val) {
  if (key === 'edu')      return val === '수료완료';
  if (key === 'consult')  return !!(val && val !== '미참여');
  if (key === 'content')  return !!(val && val !== '미신청');
  if (key === 'exhibit')  return val === '참여';
  if (key === 'consult2') return val === '참여';
  return false;
}

function toggleRow(i, color, bg) {
  const row = document.getElementById('hrow-' + i);
  row.classList.toggle('checked');
  if (row.classList.contains('checked')) {
    row.style.borderColor = color;
    row.style.background  = bg;
  } else {
    row.style.borderColor = 'transparent';
    row.style.background  = '';
  }
}

function renderResult(d) {
  const level = d.level || '시작';
  const emoji = levelEmoji[level] || '🌱';
  const tasks = taskDef[level] || taskDef['시작'];
  const color = colorMap[level];
  const bg    = bgMap[level];

  const done  = tasks.filter(t => isDone(t.key, d[t.key])).length;
  const total = tasks.length;
  const pct   = Math.round(done / total * 100);

  const rowsHTML = tasks.map(function(t, i) {
    const badge   = statusBadge(t.key, d[t.key]);
    const sc = badge[0], sl = badge[1];
    const checked = isDone(t.key, d[t.key]);
    const bStyle  = checked ? 'border-color:' + color + ';background:' + bg : '';
    return '<div class="hash-row color-' + level + (checked ? ' checked' : '') + '" id="hrow-' + i + '"'
      + ' style="' + bStyle + '" onclick="toggleRow(' + i + ',\'' + color + '\',\'' + bg + '\')">'
      + '<div class="chk">✓</div>'
      + '<div class="hash-content">'
      + '<span class="hash-tag bg-' + level + '">' + t.tag + '</span>'
      + '<span class="hash-title">' + t.title + '</span>'
      + '<span class="status-badge ' + sc + '">' + sl + '</span>'
      + '<div class="hash-desc">' + t.desc + '</div>'
      + '</div></div>';
  }).join('');

  const prHTML = (d.pr && d.pr !== '미선정')
    ? '<div class="extra-note">🎯 <strong>' + d.pr + '</strong> 지원 선정 완료</div>'
    : '<div class="extra-none">인플루언서 연계 홍보 / 라이브커머스 — 사업평가를 통해 별도 선정</div>';

  const resultEl = document.getElementById('result');
  resultEl.innerHTML =
    '<div class="result-header ' + level + '">'
    + '<div class="step-emoji">' + emoji + '</div>'
    + '<div class="info"><h3>' + d.name + '</h3>'
    + '<p>' + d.type + ' · 품목: ' + (d.item||'-') + ' · ' + (d.biz_fmt||d.biz) + '</p></div>'
    + '<div class="level-badge">' + level + ' 단계</div>'
    + '</div>'
    + '<div class="result-body">'

    + '<div class="summary-grid">'
    + '<div class="summary-item"><div class="summary-num" style="color:' + color + '">' + pct + '%</div><div class="summary-label">전체 진행률</div></div>'
    + '<div class="summary-item"><div class="summary-num" style="color:#185FA5">' + done + '/' + total + '</div><div class="summary-label">완료 항목</div></div>'
    + '<div class="summary-item"><div class="summary-num" style="color:#3B6D11">' + level + '</div><div class="summary-label">현재 단계</div></div>'
    + '<div class="summary-item"><div class="summary-num" style="color:#6D28D9">' + ((d.pr && d.pr !== '미선정') ? '선정' : '대기') + '</div><div class="summary-label">홍보지원</div></div>'
    + '</div>'

    + '<div class="task-section">'
    + '<div class="section-head"><span class="bar" style="background:' + color + '"></span>과업 항목 — 클릭하면 상세 내용을 볼 수 있어요</div>'
    + '<div class="progress-label"><span>' + done + ' / ' + total + ' 항목 완료</span><span style="font-weight:700;color:' + color + '">' + pct + '%</span></div>'
    + '<div class="progress-bar" style="margin-bottom:16px"><div class="progress-fill fill-' + level + '" style="width:' + pct + '%"></div></div>'
    + rowsHTML
    + '</div>'

    + '<div class="task-section">'
    + '<div class="section-head"><span class="bar" style="background:#F59E0B"></span>추가 지원 (홍보 · 별도 선정)</div>'
    + prHTML
    + '</div>'

    + '</div>';

  resultEl.style.display = 'block';
  window.scrollTo({ top: resultEl.offsetTop - 40, behavior: 'smooth' });
}
</script>
</body>
</html>
